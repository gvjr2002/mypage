<meta charset="UTF-8">
<title>Analytics Event Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {font-family: Arial; margin:0; line-height:1.4}
  nav {background:#222; color:#fff; padding:10px; position:sticky; top:0}
  nav button {margin-right:10px}
  section {padding:20px; border-bottom:1px solid #ddd}
  .card {border:1px solid #ccc; padding:15px; margin:10px 0}
  .hover-box {padding:20px; background:#eee; display:inline-block}
  .long-content {height:400px; overflow:auto; border:1px solid #aaa}
  .hidden {display:none}
  .modal {position:fixed; inset:0; background:#0008; display:none; align-items:center; justify-content:center}
  .modal-content {background:#fff; padding:20px}
</style>
</head>

<body>

<nav>
  <button onclick="navigate('/')">Home</button>
  <button onclick="navigate('/products')">Products</button>
  <button onclick="navigate('/login')">Login</button>
  <button onclick="openModal()">Open Modal</button>
</nav>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Modal Interaction</h3>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// ================= GLOBAL EVENT DEBUGGER =================
const events = ["click","mousedown","mouseup","mouseenter","mouseleave",
"focus","blur","input","change","keydown","keyup","submit"];

events.forEach(evt=>{
  document.addEventListener(evt, e=>{
    console.log("EVENT:", evt, "Target:", e.target, "Path:", e.composedPath());
  }, true);
});

window.addEventListener("scroll", ()=>console.log("Scroll Y:", window.scrollY));

// ================= SPA ROUTER =================
function navigate(path){
  history.pushState({}, "", path);
  renderRoute();
  console.log("URL:", location.pathname);
}
window.onpopstate = renderRoute;

function renderRoute(){
  const app=document.getElementById("app");
  if(location.pathname==="/products") app.innerHTML=productsPage();
  else if(location.pathname==="/login") app.innerHTML=loginPage();
  else app.innerHTML=homePage();
}

// ================= HOME =================
function homePage(){
return `
<section>
<h1>Home</h1>
<div class="hover-box">Hover me</div>

<h2>Accordion</h2>
<button onclick="toggleAccordion()">Toggle</button>
<div id="accordion" class="hidden">Accordion content</div>

<h2>Search Form</h2>
<form onsubmit="alert('Search submitted');return false;">
<input placeholder="Search..." required>
<select><option>All</option><option>Products</option></select>
<button>Search</button>
</form>

<h2>Infinite Scroll Simulation</h2>
<div class="long-content" id="scrollArea"></div>

<h2>Dynamic DOM</h2>
<button onclick="addDynamic()">Add element after delay</button>

<h2>Iframe Demo</h2>
<div id="iframeContainer"></div>

<h2>Shadow DOM Components</h2>
<shadow-form></shadow-form>
<nested-shadow></nested-shadow>
</section>`;
}

// ================= PRODUCTS =================
function productsPage(){
return `
<section>
<h1>Products</h1>
<div class="card">
  <h3>Product A</h3>
  <button onclick="alert('Added to cart')">Add to cart</button>
</div>

<form onsubmit="alert('Checkout submitted');return false;">
<h2>Checkout Form</h2>
<input placeholder="Name" required>
<input type="password" placeholder="Password">
<textarea placeholder="Address"></textarea>
<label><input type="checkbox"> Accept terms</label><br>
<label><input type="radio" name="pay"> Card</label>
<label><input type="radio" name="pay"> COD</label><br>
<select><option>India</option><option>USA</option></select>
<button>Submit</button>
</form>
</section>`;
}

// ================= LOGIN =================
function loginPage(){
return `
<section>
<h1>Login / Signup / Feedback</h1>

<form onsubmit="alert('Login submit');return false;">
<h3>Login</h3>
<input placeholder="Email" required>
<input type="password" placeholder="Password">
<button>Login</button>
</form>

<form onsubmit="alert('Signup submit');return false;">
<h3>Signup</h3>
<input placeholder="Name">
<input placeholder="Email">
<input type="password" placeholder="Password">
<textarea placeholder="Bio"></textarea>
<label><input type="checkbox"> Subscribe</label>
<select><option>Male</option><option>Female</option></select>
<button>Signup</button>
</form>

<form onsubmit="alert('Feedback submit');return false;">
<h3>Feedback</h3>
<textarea required></textarea>
<button>Submit</button>
</form>

</section>`;
}

// ================= ACCORDION =================
function toggleAccordion(){
  document.getElementById("accordion").classList.toggle("hidden");
}

// ================= MODAL =================
function openModal(){ modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

// ================= DYNAMIC ELEMENT =================
function addDynamic(){
  setTimeout(()=>{
    const el=document.createElement("button");
    el.textContent="Dynamically added button";
    document.body.appendChild(el);
  },1500);
}

// ================= INFINITE SCROLL =================
function loadScroll(){
  const area=document.getElementById("scrollArea");
  if(!area) return;
  for(let i=0;i<50;i++){
    const p=document.createElement("p");
    p.textContent="Scrollable content line "+i;
    area.appendChild(p);
  }
}
document.addEventListener("DOMContentLoaded", loadScroll);

// ================= SHADOW DOM COMPONENT =================
customElements.define("shadow-form", class extends HTMLElement{
  constructor(){
    super();
    const shadow=this.attachShadow({mode:"open"});
    shadow.innerHTML=`
      <style>button{background:#ddd}</style>
      <h3>Shadow DOM Form</h3>
      <form>
        <input placeholder="Shadow input">
        <button>Submit</button>
      </form>`;
  }
});

// Nested shadow DOM
customElements.define("nested-shadow", class extends HTMLElement{
  constructor(){
    super();
    const shadow=this.attachShadow({mode:"open"});
    const inner=document.createElement("inner-shadow");
    shadow.appendChild(inner);
  }
});
customElements.define("inner-shadow", class extends HTMLElement{
  constructor(){
    super();
    const shadow=this.attachShadow({mode:"open"});
    shadow.innerHTML=`<button>Nested Shadow Button</button>`;
  }
});

// ================= IFRAME =================
function createIframe(){
  const iframe=document.createElement("iframe");
  iframe.srcdoc=`
    <h3>Iframe Form</h3>
    <form onsubmit="alert('iframe form submit');return false;">
      <input placeholder="Iframe input">
      <button>Submit</button>
    </form>`;
  document.getElementById("iframeContainer").appendChild(iframe);
}
setTimeout(createIframe,1000);

// Initial render
renderRoute();
</script>

</body>
</html>
