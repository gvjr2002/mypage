<!DOCTYPE html>
<html>
<head>
   <script referrerpolicy="no-referrer-when-downgrade" src="https://dev.visualwebsiteoptimizer.com/cloud-run-test/final/29000585.js" id="vwoCode"></script>
  <title>Ultimate Event Test Page</title>

  <style>
    body {font-family: Arial; margin:0}
    nav {background:#222;color:#fff;padding:15px}
    nav button{margin-right:10px}
    .page{display:none;padding:20px}
    .active{display:block}
    .box{width:220px;height:120px;background:#eee;margin:20px 0;padding:10px}
    #scrollArea{height:900px;background:linear-gradient(white,lightblue)}
    iframe{width:100%;height:250px;border:2px solid black}
  </style>
</head>

<body>

<nav>
  SPA Navigation:
  <button onclick="navigate('home')">Home</button>
  <button onclick="navigate('forms')">Forms</button>
  <button onclick="navigate('journey')">User Journey</button>
</nav>

<!-- HOME PAGE -->
<div id="home" class="page active">
  <h2>Home Page Events</h2>

  <button id="clickBtn">Click + MouseDown Test</button>

  <div id="hoverBox" class="box">Hover Over Me</div>

  <div id="scrollArea">Scroll Down Page</div>

  <h3>Shadow DOM in Home</h3>
  <div id="homeShadowHost"></div>

  <h3>Iframe in Home</h3>
  <iframe srcdoc='
    <h3>Iframe Area</h3>
    <input id="iframeFocus" placeholder="Focus inside iframe"><br><br>
    <button onclick="console.log(`Iframe click`)">Iframe Click</button>
    <form onsubmit="event.preventDefault();console.log(`Iframe form submit`)">
      <input placeholder="Iframe Name">
      <button type="submit">Submit</button>
    </form>
  '></iframe>
</div>

<!-- FORMS PAGE -->
<div id="forms" class="page">
  <h2>Normal Forms</h2>

  <form id="form1">
    <h3>Form 1</h3>
    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <button type="submit">Submit Form 1</button>
  </form>

  <br><br>

  <form id="form2">
    <h3>Form 2</h3>
    <input id="phone" placeholder="Phone"><br><br>
    <button type="submit">Submit Form 2</button>
  </form>

  <h3>Shadow DOM Form</h3>
  <div id="formShadowHost"></div>

  <h3>Iframe Form</h3>
  <iframe srcdoc='
    <form onsubmit="event.preventDefault();console.log(`Iframe Form Submitted`)">
      <input id="iframeEmail" placeholder="Iframe Email"><br><br>
      <button type="submit">Submit Iframe Form</button>
    </form>
  '></iframe>
</div>

<!-- USER JOURNEY PAGE -->
<div id="journey" class="page">
  <h2>Real User Journey Simulation</h2>
  <p>Step 1: Click → Step 2: Focus → Step 3: Hover → Step 4: Submit</p>

  <button id="journeyClick">Start Journey</button>
  <br><br>
  <input id="journeyInput" placeholder="Focus here"><br><br>
  <div id="journeyHover" class="box">Hover me</div>

  <form id="journeyForm">
    <input placeholder="Final Input">
    <button type="submit">Finish Journey</button>
  </form>
</div>

<script>
/* SPA NAVIGATION */
function navigate(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  history.pushState({}, "", "#"+page);
}

/* CLICK + MOUSEDOWN */
clickBtn.addEventListener("click",()=>console.log("Click fired"));
clickBtn.addEventListener("mousedown",()=>console.log("MouseDown fired"));

/* HOVER */
hoverBox.addEventListener("mouseover",()=>console.log("Hover fired"));

/* SCROLL */
window.addEventListener("scroll",()=>console.log("Scroll fired"));

/* GLOBAL FOCUS / BLUR */
document.addEventListener("focus",e=>console.log("Focus:",e.target.id),true);
document.addEventListener("blur",e=>console.log("Blur:",e.target.id),true);

/* FORM SUBMITS */
form1.onsubmit=e=>{e.preventDefault();console.log("Form1 submitted")};
form2.onsubmit=e=>{e.preventDefault();console.log("Form2 submitted")};
journeyForm.onsubmit=e=>{e.preventDefault();console.log("Journey completed")};

/* JOURNEY EVENTS */
journeyClick.onclick=()=>console.log("Journey click");
journeyHover.onmouseover=()=>console.log("Journey hover");

/* SHADOW DOM - HOME */
const homeShadow = document.getElementById("homeShadowHost").attachShadow({mode:"open"});
homeShadow.innerHTML = `
  <h4>Shadow Elements</h4>
  <input id="shadowInputHome" placeholder="Shadow Focus">
  <button id="shadowBtnHome">Shadow Click</button>
  <form id="shadowFormHome">
    <input placeholder="Shadow Name">
    <button type="submit">Submit Shadow Form</button>
  </form>
`;
homeShadow.getElementById("shadowBtnHome")
  .addEventListener("click",()=>console.log("Shadow click (home)"));
homeShadow.getElementById("shadowFormHome")
  .addEventListener("submit",e=>{e.preventDefault();console.log("Shadow form submit (home)")});

/* SHADOW DOM - FORMS */
const formShadow = document.getElementById("formShadowHost").attachShadow({mode:"open"});
formShadow.innerHTML = `
  <form id="shadowForm2">
    <input id="shadowEmail" placeholder="Shadow Email">
    <button type="submit">Submit Shadow Form 2</button>
  </form>
`;
formShadow.getElementById("shadowForm2")
  .addEventListener("submit",e=>{e.preventDefault();console.log("Shadow form 2 submit")});
</script>

</body>
</html>
